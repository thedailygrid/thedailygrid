<!DOCTYPE html>
<html>
<head>
    <title>Crosshare Test</title>

    <style>
        body{
            font-family:Arial;
            margin:20px;
        }

        iframe{
            width:100%;
            height:90vh;
            border:1px solid #ccc;
        }

        #messages{
            margin-top:20px;
            padding:15px;
            background:#f5f5f5;
            border:1px solid #ccc;
            white-space:pre-wrap;
            min-height:150px;
        }
    </style>
</head>

<body>

<h2>Crosshare Event Test</h2>

<iframe style="height: 90vh; width: 100%;" src="https://crosshare.org/embed/fGW6acThn65UG1Lzb5ic/TYrDX2A5JAho33uKbKqhuVtYek22" frameborder="0" allowfullscreen="true" allowtransparency="true" allow="clipboard-write *"></iframe>

<div id="messages">
Waiting for messages...
</div>

<script>

const box = document.getElementById("messages");

window.addEventListener("message", function(event){

    console.log("Received event:");
    console.log(event);

    box.textContent +=
        "\n\n---------------------------\n\n" +
        JSON.stringify(event.data, null, 2);

});

</script>

</body>
</html>
