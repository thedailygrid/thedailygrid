<!DOCTYPE html>
<html>
<head>
    <title>Crosshare Test</title>

    <style>
        body{
            font-family:Arial;
            margin:20px;
        }

        iframe{
            width:100%;
            height:85vh;
            border:1px solid #ccc;
        }

        #log{
            margin-top:20px;
            padding:10px;
            background:#f5f5f5;
            border:1px solid #ddd;
            height:250px;
            overflow:auto;
            white-space:pre-wrap;
        }
    </style>
</head>

<body>

<h2>Crosshare Event Test</h2>

<iframe
style="height:90vh;width:100%;"
src="https://crosshare.org/embed/YiQ9yfeEXHfNTBkwm2Lw/TYrDX2A5JAho33uKbKqhuVtYek22"
frameborder="0"
allowfullscreen
allow="clipboard-write *">
</iframe>

<h3>Messages received</h3>

<div id="log">
Waiting...
</div>

<script>

const log=document.getElementById("log");

window.addEventListener("message",(event)=>{

    console.log("EVENT RECEIVED");

    console.log(event);

    log.innerHTML +=
        "\n\n------------------------\n\n"+
        JSON.stringify(event.data,null,2);

});

</script>

</body>
</html>
